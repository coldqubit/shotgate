version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly

  # The website's Pages deploy lives on the orphan `web` branch; keep its
  # actions current too (main's github-actions entry only sees main).
  - package-ecosystem: github-actions
    directory: "/"
    target-branch: web
    schedule:
      interval: weekly
