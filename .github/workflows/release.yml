name: release

# Triggered by a semver tag (e.g. v0.1.0). Builds the Python distribution and the
# container image, publishes the image to GHCR, and attaches the dist to the
# GitHub Release. Everything is built inside containers.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  build-dist:
    name: build python distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Pull base image (retry + mirror fallback)
        run: |
          .github/scripts/pull-base-image.sh \
            docker.io/library/python:3.12-slim \
            public.ecr.aws/docker/library/python:3.12-slim

      - name: Build sdist + wheel (containerized)
        run: |
          podman run --rm -v "$PWD:/work:Z" -w /work \
            docker.io/library/python:3.12-slim bash -euc "
              pip install -q build
              python -m build
            "

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*

  publish-image:
    name: publish container image to GHCR
    runs-on: ubuntu-latest
    needs: build-dist
    # Mapped at job level so the optional Docker Hub step can guard on env (the
    # secrets context is not available inside a step-level if:).
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_NAMESPACE }}
    steps:
      - uses: actions/checkout@v6

      - name: Pull base image (retry + mirror fallback)
        run: |
          .github/scripts/pull-base-image.sh \
            docker.io/library/python:3.12-slim \
            public.ecr.aws/docker/library/python:3.12-slim

      - name: Compute image refs
        id: meta
        run: |
          # ghcr.io/coldqubit/shotgate when hosted at github.com/coldqubit/shotgate
          IMG="ghcr.io/${GITHUB_REPOSITORY,,}"
          VERSION="${GITHUB_REF_NAME#v}"      # strip leading 'v' from the tag
          SHA="${GITHUB_SHA::12}"             # short git sha
          {
            echo "image=${IMG}"
            echo "version=${VERSION}"
            echo "sha=${SHA}"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            podman login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push runtime image (aer)
        env:
          IMG: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.meta.outputs.sha }}
        run: |
          # Tags: semver version, git sha, and latest.
          podman build \
            -t "${IMG}:${VERSION}" \
            -t "${IMG}:${SHA}" \
            -t "${IMG}:latest" .
          podman push "${IMG}:${VERSION}"
          podman push "${IMG}:${SHA}"
          podman push "${IMG}:latest"

      - name: Build and push IBM variant (aer + qiskit-ibm-runtime)
        env:
          IMG: ${{ steps.meta.outputs.image }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          # Cloud/QPU-capable image so the ibm backend is runnable from a pull.
          podman build --build-arg SHOTGATE_EXTRAS="aer,ibm" \
            -t "${IMG}:${VERSION}-ibm" \
            -t "${IMG}:latest-ibm" .
          podman push "${IMG}:${VERSION}-ibm"
          podman push "${IMG}:latest-ibm"

      # Optional Docker Hub mirror. GHCR is the canonical registry; this only runs
      # when both DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets exist,
      # so the release never fails for the absence of a Docker Hub account. To
      # enable: create a Docker Hub repo and an access token, then add those two
      # secrets. The Hub namespace defaults to the GitHub owner; override with the
      # DOCKERHUB_NAMESPACE secret if your Hub org differs.
      - name: Mirror images to Docker Hub (optional)
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA: ${{ steps.meta.outputs.sha }}
          DH_USER: ${{ env.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ env.DOCKERHUB_TOKEN }}
          DH_NS: ${{ env.DOCKERHUB_NAMESPACE }}
          GHCR_IMG: ${{ steps.meta.outputs.image }}
          OWNER: ${{ github.repository_owner }}
        run: |
          NS="${DH_NS:-$OWNER}"
          DH="docker.io/${NS,,}/shotgate"
          echo "$DH_TOKEN" | podman login docker.io -u "$DH_USER" --password-stdin
          # Retag the images already built above (no rebuild) and push the same set.
          for tag in "$VERSION" "$SHA" latest "${VERSION}-ibm" latest-ibm; do
            podman tag "${GHCR_IMG}:${tag}" "${DH}:${tag}"
            podman push "${DH}:${tag}"
          done

  publish-pypi:
    name: publish to PyPI (trusted publishing)
    runs-on: ubuntu-latest
    needs: build-dist
    # OIDC, no API token. GitHub mints a signed identity token that PyPI verifies
    # against a configured trusted publisher. One-time setup on PyPI before the
    # first tag: pypi.org -> the `shotgate` project (or a "pending publisher" if it
    # does not exist yet) -> add a GitHub publisher with
    #   owner: coldqubit  repo: shotgate  workflow: release.yml  environment: pypi
    environment:
      name: pypi
      url: https://pypi.org/p/shotgate
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  github-release:
    name: create github release
    runs-on: ubuntu-latest
    needs: [build-dist, publish-image, publish-pypi]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Compose install instructions
        id: notes
        run: |
          V="${GITHUB_REF_NAME#v}"
          {
            echo "## Install ${GITHUB_REF_NAME}"
            echo
            echo "The package is on **PyPI** and the image on the **GitHub Container Registry (GHCR)** for convenience (the usual one-liners below). If you would rather not use a package index at all, the wheel attached to this release and the GHCR image are both pullable straight from GitHub, no extra account needed."
            echo
            echo "**Python package** (PyPI, or the attached wheel):"
            echo '```bash'
            echo "pip install 'shotgate[aer]==${V}'"
            echo "# or straight from this release, no index:"
            echo "pip install https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/shotgate-${V}-py3-none-any.whl"
            echo '```'
            echo
            echo "**Container** (GHCR; add the \`-ibm\` tag suffix for the QPU-capable variant):"
            echo '```bash'
            echo "podman pull ghcr.io/${GITHUB_REPOSITORY}:${V}"
            echo "podman run --rm -v \"\$PWD:/work:Z\" -w /work ghcr.io/${GITHUB_REPOSITORY}:${V} run examples/bell-state/workflow.yaml"
            echo '```'
            echo
            echo "---"
          } > release-notes.md
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: release-notes.md
          append_body: true
          generate_release_notes: true
