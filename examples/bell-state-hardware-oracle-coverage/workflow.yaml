apiVersion: shotgate.dev/v1alpha1
kind: QuantumWorkflow
metadata:
  name: bell-state-hardware-oracle-coverage
  description: >-
    DIAGNOSTIC, not a gate. Exercises the hardware-capable counts-based oracles on a real
    QPU against one Bell circuit so each has at least one hardware data point: the distance
    and structural oracles, the observable and entropy oracles, and the automatically
    readout-aware kl_divergence. chi_square is intentionally absent: it is simulator-only and
    fails closed on hardware (ADR-0015), so gate hardware with TVD / fidelity / leakage. Run
    manually (excluded from the gating loop); read the numbers from the JSON report. Requires
    an IBM token (SHOTGATE_IBM_TOKEN).
  labels:
    suite: diagnostic
    qubits: "2"
    target: qpu

defaults:
  backend:
    provider: ibm
    shots: 4096
    # name omitted on purpose: least_busy is the portable default. Pin a device
    # only for reproducibility, and only one your account can actually reach.
    # options:
    #   instance: "crn:v1:bluemix:public:quantum-computing:us-east:a/<account>:<id>::"

jobs:
  - name: bell-pair-all-oracles
    circuit:
      format: qasm2
      path: bell.qasm
    assertions:
      # Distance-based, noise-tolerant.
      - type: distribution_tvd
        expected: { "00": 0.5, "11": 0.5 }
        max_distance: 0.15
      - type: hellinger_fidelity
        expected: { "00": 0.5, "11": 0.5 }
        min_fidelity: 0.85
      # Structural leakage budget.
      - type: allowed_states
        states: ["00", "11"]
        max_leakage: 0.15
      # Marginal probability window for |00> (covered on Grover for |11>; here on
      # the Bell circuit too, for completeness).
      - type: state_probability
        state: "00"
        min: 0.35
        max: 0.65
      # chi_square is omitted on purpose: it is simulator-only and fails closed on a real
      # QPU (ADR-0015). On hardware the distance and structural oracles above do the gating.
      # Parity observable: a Bell pair is Z-correlated; noise lands it below 1.
      - type: expectation_value
        qubits: [0, 1]
        min: 0.5
      # Distribution entropy: ~1 bit for an ideal balanced Bell; device leakage into
      # 01/10 spreads the mass and pushes it higher (measured 1.33 on ibm_fez).
      - type: shannon_entropy
        min: 0.8
        max: 1.5
      # kl_divergence is automatically readout-aware on a QPU: the backend attaches the
      # device's readout calibration and KL transforms the ideal expected through it, so it
      # stays finite despite leakage (0.0064 bits on ibm_marrakesh). On a simulator no
      # calibration is attached, so it falls back to the plain divergence. No config needed.
      - type: kl_divergence
        expected: { "00": 0.5, "11": 0.5 }
        max_divergence: 0.1
