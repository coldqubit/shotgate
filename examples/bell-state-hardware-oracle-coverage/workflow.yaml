apiVersion: shotgate.dev/v1alpha1
kind: QuantumWorkflow
metadata:
  name: bell-state-hardware-oracle-coverage
  description: >-
    DIAGNOSTIC, not a gate. Exercises the counts-based oracles on a real QPU against
    one Bell circuit so each has at least one hardware data point. The plain
    chi_square is included ONLY to measure its behaviour: against the ideal expected
    distribution (zero probability on the error states 01/10) any device leakage
    forces rejection, so it is EXPECTED to fail and is kept out of the gating hardware
    examples. The noise-aware chi_square and kl_divergence (with a readout_error
    model) and the observable/entropy oracles are also measured here. Run manually
    (excluded from the gating loop); read the numbers from the JSON report. Requires
    an IBM token (SHOTGATE_IBM_TOKEN).
  labels:
    suite: diagnostic
    qubits: "2"
    target: qpu

defaults:
  backend:
    provider: ibm
    shots: 4096
    # name omitted on purpose: least_busy is the portable default. Pin a device
    # only for reproducibility, and only one your account can actually reach.
    # options:
    #   instance: "crn:v1:bluemix:public:quantum-computing:us-east:a/<account>:<id>::"

jobs:
  - name: bell-pair-all-oracles
    circuit:
      format: qasm2
      path: bell.qasm
    assertions:
      # Distance-based, noise-tolerant.
      - type: distribution_tvd
        expected: { "00": 0.5, "11": 0.5 }
        max_distance: 0.15
      - type: hellinger_fidelity
        expected: { "00": 0.5, "11": 0.5 }
        min_fidelity: 0.85
      # Structural leakage budget.
      - type: allowed_states
        states: ["00", "11"]
        max_leakage: 0.15
      # Marginal probability window for |00> (covered on Grover for |11>; here on
      # the Bell circuit too, for completeness).
      - type: state_probability
        state: "00"
        min: 0.35
        max: 0.65
      # EXPECTED TO FAIL on hardware: against the ideal expected distribution the
      # error states 01/10 have probability 0, so any leakage drives the statistic
      # up and the p-value to 0. Present to MEASURE that, not to gate.
      - type: chi_square
        expected: { "00": 0.5, "11": 0.5 }
        significance: 0.01
      # --- oracles added since v0.2, measured on hardware (still non-gating) ---
      # Parity observable: a Bell pair is Z-correlated; noise lands it below 1.
      - type: expectation_value
        qubits: [0, 1]
        min: 0.5
      # Distribution entropy: ~1 bit for an ideal balanced Bell; device leakage into
      # 01/10 spreads the mass and pushes it higher (measured 1.33 on ibm_fez).
      - type: shannon_entropy
        min: 0.8
        max: 1.5
      # Noise-aware variants with readout_error: auto. The oracle uses the readout
      # calibration the run actually had (read from the device's published properties),
      # giving the ideal expected nonzero mass on the error states, so these CAN pass on
      # hardware (contrast the plain chi_square above). On a noiseless simulator there is
      # no calibration, so auto falls back to the plain test.
      - type: chi_square
        expected: { "00": 0.5, "11": 0.5 }
        readout_error: auto
        significance: 0.01
      - type: kl_divergence
        expected: { "00": 0.5, "11": 0.5 }
        readout_error: auto
        max_divergence: 0.1
